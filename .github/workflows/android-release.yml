name: Publish Android release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: android-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: production
    env:
      BRANLLY_SIGNING_STORE_FILE: ${{ github.workspace }}/release.jks
      BRANLLY_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      BRANLLY_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      BRANLLY_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      SIGNING_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Restore signing key
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SIGNING_KEYSTORE_BASE64"
          test -n "$BRANLLY_SIGNING_STORE_PASSWORD"
          test -n "$BRANLLY_SIGNING_KEY_ALIAS"
          test -n "$BRANLLY_SIGNING_KEY_PASSWORD"
          printf '%s' "$SIGNING_KEYSTORE_BASE64" | base64 --decode > "$BRANLLY_SIGNING_STORE_FILE"
          chmod 600 "$BRANLLY_SIGNING_STORE_FILE"

      - name: Verify and build signed release
        run: ./gradlew --no-daemon testReleaseUnitTest lintRelease assembleRelease

      - name: Prepare checksummed APK
        shell: bash
        run: |
          set -euo pipefail
          apk="Branlly-Pocket-${GITHUB_REF_NAME}.apk"
          cp app/build/outputs/apk/release/app-release.apk "$apk"
          sha256sum "$apk" > "$apk.sha256"

      - name: Publish GitHub release
        shell: bash
        run: gh release create "$GITHUB_REF_NAME" "Branlly-Pocket-${GITHUB_REF_NAME}.apk" "Branlly-Pocket-${GITHUB_REF_NAME}.apk.sha256" --verify-tag --generate-notes --title "Branlly Pocket ${GITHUB_REF_NAME}"

      - name: Remove signing key
        if: always()
        run: rm -f "$BRANLLY_SIGNING_STORE_FILE"
